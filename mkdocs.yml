site_name: ARF Specification
site_description: Agentic Reliability Framework – canonical specification
site_author: ARF Foundation
repo_url: https://github.com/arf-foundation/arf-spec
edit_uri: edit/main/docs/

# Versioning (optional, requires plugin)
# extra:
#   version:
#     provider: mike

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  # Uncomment if using versioning
  # - mike:
  #     version_selector: true
  #     canonical_version: latest

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/extra.js   # Custom script for Mermaid dark/light theme switching

extra_css:
  - stylesheets/extra.css   # Mobile-friendly overrides
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.css

nav:
  - Home: index.md
  - Core Concepts: core_concepts.md
  - Roadmap: roadmap.md
  - Design: design.md
  - Mathematics: mathematics.md
  - Psychology: psychology.md
  - Philosophy: philosophy.md
  - Governance: governance.md
  - Enterprise: enterprise.md
  - Temporal Reliability: temporal_reliability.md
  - Glossary: glossary.md
